<h1>QR Code Generator</h1>

<p>Generate QR code from text or URL instantly.</p>

</div>

<div class="tool-form">

<label>Enter Text / URL</label>

<input
type="text"
id="text"
placeholder="https://example.com">

<button class="btn" onclick="generateQR()">
Generate QR Code
</button>

</div>

<div id="qrcode"></div>

</div>

</section>

<footer>

<div class="container">

<p>© 2026 MyTools. All Rights Reserved.</p>

</div>

</footer>

<script>

let qr;

function generateQR(){

    const text =
    document.getElementById("text").value;

    if(!text){

        alert("Please enter text or URL");

        return;
    }

    document.getElementById("qrcode")
    .innerHTML = "";

    qr = new QRCode(document.getElementById("qrcode"), {

        text: text,
        width: 200,
        height: 200,
        colorDark: "#000000",
        colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.H
    });
}

</script>
