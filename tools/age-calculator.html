<script>

function calculateAge(){

    const dobInput =
    document.getElementById("dob").value;

    if(!dobInput){

        alert("Please select your date of birth.");

        return;
    }

    const birthDate =
    new Date(dobInput);

    const today =
    new Date();

    let years =
    today.getFullYear() -
    birthDate.getFullYear();

    let months =
    today.getMonth() -
    birthDate.getMonth();

    let days =
    today.getDate() -
    birthDate.getDate();

    if(days < 0){

        months--;

        const previousMonth =
        new Date(
            today.getFullYear(),
            today.getMonth(),
            0
        );

        days += previousMonth.getDate();
    }

    if(months < 0){

        years--;

        months += 12;
    }

    document.getElementById("years")
    .innerText = years;

    document.getElementById("months")
    .innerText = months;

    document.getElementById("days")
    .innerText = days;

    document.getElementById("resultBox")
    .style.display = "block";

}

</script>
