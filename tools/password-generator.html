<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Free online tools for everyone.">
<meta name="keywords" content="calculator, qr generator, password generator, bmi calculator">
<meta name="author" content="Your Name">

<meta property="og:title" content="MyTools">
<meta property="og:description" content="Free Online Tools Website">
<meta property="og:type" content="website">
<meta property="og:url" content="https://mdmasudurrahman0601-max.github.io/">
<title>Password Generator - MyTools</title>

<meta name="description"
content="Generate strong and secure passwords online for free.">

<link rel="stylesheet" href="../style.css">

<style>

.page-section{
    padding:60px 20px;
}

.tool-container{
    max-width:700px;
    margin:auto;
}

.tool-title{
    text-align:center;
    margin-bottom:30px;
}

.tool-title h1{
    color:#2563eb;
    margin-bottom:10px;
}

.back-home{
    display:inline-block;
    margin-bottom:20px;
    text-decoration:none;
    color:#2563eb;
    font-weight:600;
}

.checkbox-group{
    margin:15px 0;
}

.checkbox-group label{
    display:block;
    margin-bottom:10px;
}

.password-output{
    width:100%;
    padding:15px;
    margin-top:20px;
    border:1px solid #ddd;
    border-radius:10px;
    font-size:16px;
}

.action-buttons{
    margin-top:15px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

</style>

</head>

<body>

<header>
<div class="container nav">

<div class="logo">MyTools</div>

<nav>
<ul>
<li><a href="../index.html">Home</a></li>
<li><a href="../index.html#tools">Tools</a></li>
</ul>
</nav>

</div>
</header>

<section class="page-section">

<div class="tool-container">

<a href="../index.html"
class="back-home">
← Back to Home </a>

<div class="tool-title">

<h1>Password Generator</h1>

<p>
Generate strong and secure passwords instantly.
</p>

</div>

<div class="tool-form">

<label>Password Length</label>

<input
type="number"
id="length"
min="4"
max="100"
value="12">

<div class="checkbox-group">

<label>
<input
type="checkbox"
id="uppercase"
checked>
 Uppercase Letters
</label>

<label>
<input
type="checkbox"
id="lowercase"
checked>
 Lowercase Letters
</label>

<label>
<input
type="checkbox"
id="numbers"
checked>
 Numbers
</label>

<label>
<input
type="checkbox"
id="symbols"
checked>
 Symbols
</label>

</div>

<button
class="btn"
onclick="generatePassword()">
Generate Password </button>

<input
type="text"
id="passwordOutput"
class="password-output"
readonly
placeholder="Generated password will appear here">

<div class="action-buttons">

<button
class="btn"
onclick="copyPassword()">
Copy Password </button>

</div>

</div>

</div>

</section>

<footer>
<div class="container">
<p>© 2026 MyTools. All Rights Reserved.</p>
</div>
</footer>

<script>

function generatePassword(){

    const length =
    parseInt(
    document.getElementById("length").value
    );

    const uppercase =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ";

    const lowercase =
    "abcdefghijklmnopqrstuvwxyz";

    const numbers =
    "0123456789";

    const symbols =
    "!@#$%^&*()_+-=[]{}|;:,.<>?";

    let chars = "";

    if(document.getElementById("uppercase").checked){
        chars += uppercase;
    }

    if(document.getElementById("lowercase").checked){
        chars += lowercase;
    }

    if(document.getElementById("numbers").checked){
        chars += numbers;
    }

    if(document.getElementById("symbols").checked){
        chars += symbols;
    }

    if(chars === ""){

        alert(
        "Please select at least one option."
        );

        return;
    }

    let password = "";

    for(let i = 0; i < length; i++){

        password += chars.charAt(
        Math.floor(
        Math.random() * chars.length
        ));
    }

    document.getElementById(
    "passwordOutput"
    ).value = password;
}

function copyPassword(){

    const passwordField =
    document.getElementById(
    "passwordOutput"
    );

    if(passwordField.value === ""){

        alert("Generate a password first.");

        return;
    }

    navigator.clipboard.writeText(
    passwordField.value
    );

    alert("Password copied successfully!");
}

</script>

</body>
</html>
